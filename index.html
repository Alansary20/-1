<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>نظام الجرد الذكي | كاميرا مستقرة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
            background: linear-gradient(145deg, #eef2f8 0%, #e0e8f0 100%);
            color: #1e2a3e;
            direction: rtl;
            padding: 20px 16px 40px;
            min-height: 100vh;
        }
        .app-container { max-width: 580px; margin: 0 auto; }
        .card {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(4px);
            border-radius: 36px;
            padding: 20px 18px;
            margin-bottom: 22px;
            box-shadow: 0 15px 30px -12px rgba(0,0,0,0.12), 0 1px 0 0 rgba(255,255,255,0.7) inset;
            border: none;
        }
        .header {
            background: linear-gradient(135deg, #0a2a3b, #1b4f6e);
            border-radius: 48px;
            padding: 20px;
            margin-bottom: 24px;
            color: white;
            box-shadow: 0 20px 28px -12px rgba(0,0,0,0.3);
            text-align: center;
        }
        .header h1 { font-size: 1.7rem; display: flex; align-items: center; justify-content: center; gap: 12px; font-weight: 800; }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            border-radius: 28px;
            padding: 14px 6px;
            text-align: center;
            box-shadow: 0 6px 14px rgba(0,0,0,0.04);
        }
        .stat-number { font-size: 1.9rem; font-weight: 800; color: #0f2b3d; }
        .stat-label { font-size: 0.7rem; color: #5b6e8c; font-weight: 600; }
        .tabs {
            display: flex;
            background: white;
            border-radius: 60px;
            padding: 5px;
            margin-bottom: 20px;
            gap: 6px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.04);
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 6px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            color: #5b6e8c;
            transition: 0.15s;
        }
        .tab-btn.active { background: #0f2b3d; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        .panel { display: none; animation: fadeIn 0.2s; }
        .panel.active-pane { display: block; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
        .input-field {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 60px;
            background: white;
            margin-bottom: 12px;
        }
        .input-field:focus { outline: none; border-color: #0f2b3d; box-shadow: 0 0 0 3px rgba(15,43,61,0.1); }
        .btn-primary, .btn-secondary {
            border: none;
            padding: 14px 18px;
            border-radius: 60px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            width: 100%;
            transition: 0.1s;
        }
        .btn-primary { background: #0f2b3d; color: white; box-shadow: 0 5px 0 #09212e; transform: translateY(-2px); }
        .btn-primary:active { transform: translateY(2px); box-shadow: 0 1px 0 #09212e; }
        .btn-secondary { background: #f0f4fa; color: #1e4663; border: 1px solid #cddae9; }
        .flex-2cols { display: flex; gap: 12px; margin: 10px 0; }
        .flex-2cols .btn { width: auto; flex: 1; }
        .inventory-list { max-height: 520px; overflow-y: auto; }
        .product-card {
            background: white;
            border-radius: 28px;
            padding: 14px;
            margin-bottom: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: 1px solid #ecf3f9;
        }
        .product-info { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .product-quantity { font-size: 1.6rem; font-weight: 800; color: #0f2b3d; background: #eef2ff; padding: 4px 18px; border-radius: 60px; }
        .icon-btn { background: #f1f5f9; border: none; padding: 6px 12px; border-radius: 40px; font-size: 0.7rem; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
        .data-wrapper { overflow-x: auto; border-radius: 28px; border: 1px solid #ecf3f9; background: white; margin-top: 14px; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; min-width: 380px; }
        .data-table th, .data-table td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #ecf3f9; }
        .data-table th { background: #f8fafc; font-weight: 700; }
        .badge-diff { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 40px; font-weight: bold; }
        .diff-positive { background: #e0f2e9; color: #15803d; }
        .diff-negative { background: #fee2e2; color: #b91c1c; }
        .diff-zero { background: #e0e7ff; color: #1e40af; }
        .search-input {
            width: 100%;
            padding: 10px 16px;
            border-radius: 60px;
            border: 1px solid #cbd5e1;
            margin-bottom: 14px;
            background: white;
        }
        .file-label { background: #f1f5f9; border-radius: 60px; padding: 12px; text-align: center; cursor: pointer; border: 1px dashed #2c5a7a; margin-bottom: 14px; }
        .camera-wrapper { 
            border-radius: 32px; 
            overflow: hidden; 
            margin-top: 12px; 
            background: #000;
            position: relative;
            width: 100%;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        /* تحسين وضع مستطيل المسح في الأعلى */
        #reader2 {
            position: relative;
            width: 100%;
        }
        #reader2 video {
            width: 100%;
            border-radius: 20px;
        }
        /* تخصيص منطقة المسح لتظهر في الأعلى */
        #reader2__scan_region {
            position: absolute;
            top: 15% !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            border: 2px solid #0f2b3d !important;
            box-shadow: 0 0 0 4px rgba(15,43,61,0.3);
            border-radius: 12px;
        }
        /* ضبط شكل مستطيل المسح */
        #reader2__scan_region img {
            display: none; /* نخفي صورة المسح الافتراضية */
        }
        .hidden { display: none; }
        .progress-fixed { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #e2e8f0; border-radius: 60px; overflow: hidden; height: 30px; z-index: 2000; display: none; }
        .progress-fill { width: 0%; height: 100%; background: #0f2b3d; text-align: center; line-height: 30px; color: white; font-size: 11px; }
        .toast { position: fixed; bottom: 80px; left: 20px; right: 20px; background: #1e293b; color: white; text-align: center; padding: 12px; border-radius: 60px; font-size: 0.85rem; z-index: 2100; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .flash-green { background: #bbf7d0 !important; box-shadow: 0 0 0 3px #22c55e; transition: 0.08s; }
        .flash-red { background: #fee2e2 !important; box-shadow: 0 0 0 3px #ef4444; transition: 0.08s; }
        .camera-selector { display: flex; gap: 10px; margin: 12px 0; align-items: center; flex-wrap: wrap; }
        .cam-select { flex: 2; padding: 10px; border-radius: 60px; border: 1px solid #cbd5e1; background: white; }
        .compare-stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 18px;
        }
        .compare-stat-card {
            background: white;
            border-radius: 28px;
            padding: 10px 6px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            border: 1px solid #eef2f6;
        }
        .compare-stat-number { font-size: 1.5rem; font-weight: 800; }
        .compare-stat-label { font-size: 0.65rem; color: #4b6b8f; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1><i class="fas fa-cube"></i> نظام الجرد الذكي</h1>
        <div style="display: flex; justify-content: center; gap: 12px; margin-top: 10px;">
            <button id="globalResetBtn" style="background: rgba(255,255,255,0.2); border: none; padding: 6px 16px; border-radius: 40px; color: white; font-weight: 600;"><i class="fas fa-sync-alt"></i> إعادة تعيين</button>
            <button id="globalManualBtn" style="background: rgba(255,255,255,0.2); border: none; padding: 6px 16px; border-radius: 40px; color: white; font-weight: 600;"><i class="fas fa-plus-circle"></i> إضافة منتج</button>
        </div>
    </div>
    <div class="stats-row">
        <div class="stat-card"><div class="stat-number" id="totalProductsStat">0</div><div class="stat-label">إجمالي المنتجات</div></div>
        <div class="stat-card"><div class="stat-number" id="totalInventoryStat">0</div><div class="stat-label">أصناف مجرودة</div></div>
        <div class="stat-card"><div class="stat-number" id="sessionScansStat">0</div><div class="stat-label">عمليات الجرد</div></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="tab-scan"><i class="fas fa-camera"></i> المسح</button>
        <button class="tab-btn" data-tab="tab-inv"><i class="fas fa-clipboard-list"></i> الجرد</button>
        <button class="tab-btn" data-tab="tab-stock"><i class="fas fa-database"></i> المرجع</button>
        <button class="tab-btn" data-tab="tab-cmp"><i class="fas fa-chart-line"></i> المقارنة</button>
        <button class="tab-btn" data-tab="tab-products"><i class="fas fa-archive"></i> المنتجات</button>
    </div>
    <div id="globalProgress" class="progress-fixed"><div class="progress-fill" id="progressFill">0%</div></div>

    <!-- تبويب المسح -->
    <div id="tab-scan" class="panel active-pane">
        <div class="card" id="scanCard">
            <input type="text" id="barcodeInput" class="input-field" placeholder="✍️ اكتب باركود أو رقم صنف ثم اضغط Enter" autocomplete="off">
            <div class="camera-selector">
                <select id="cameraSelect" class="cam-select"><option value="">تحميل الكاميرات...</option></select>
                <button id="startCamBtn" class="btn-primary" style="width: auto; padding: 10px 16px;"><i class="fas fa-camera-retro"></i> فتح الكاميرا</button>
                <button id="switchCamBtn" class="btn-secondary" style="width: auto; padding: 10px 16px;"><i class="fas fa-sync-alt"></i> تبديل</button>
            </div>
            <div id="cameraDiv" class="camera-wrapper hidden"><div id="reader2"></div><button id="closeCamBtn" class="btn-secondary" style="margin-top:8px;">إغلاق</button></div>
            <div class="flex-2cols">
                <button id="addOneBtn" class="btn-primary"><i class="fas fa-plus-circle"></i> +1 جرد</button>
                <button id="resetInventoryBtn" class="btn-secondary"><i class="fas fa-trash-alt"></i> مسح الجرد</button>
            </div>
            <h4 style="margin-top: 20px;">📋 آخر الجرد (الأحدث أولاً) <span id="inventoryCount" style="background:#0f2b3d; color:white; border-radius:40px; padding:2px 12px;">0</span></h4>
            <div id="inventoryListContainer" class="inventory-list"></div>
        </div>
    </div>

    <!-- تبويب الجرد الكامل -->
    <div id="tab-inv" class="panel">
        <div class="card">
            <input type="text" id="searchInventory" class="search-input" placeholder="🔍 بحث في سجل الجرد">
            <button id="exportInventoryBtn" class="btn-secondary"><i class="fas fa-file-excel"></i> تصدير Excel</button>
            <div id="inventoryFullTable" class="data-wrapper"></div>
        </div>
    </div>

    <!-- تبويب المرجع -->
    <div id="tab-stock" class="panel">
        <div class="card">
            <div style="font-weight:700; margin-bottom:12px;"><i class="fas fa-file-excel"></i> رفع ملف الرصيد الفعلي (مرجع)</div>
            <div class="file-label" id="stockUploadArea"><i class="fas fa-upload"></i> اختر ملف Excel <input type="file" id="stockFileInput" style="display:none;" accept=".xlsx,.xlsm,.xlsb"></div>
            <div style="display:flex; gap:8px; margin-bottom:12px;">
                <select id="stockModeSelect" style="flex:1; padding:10px; border-radius:40px; background:white; border:1px solid #cbd5e1;"><option value="replace">استبدال</option><option value="merge">دمج</option></select>
                <button id="processStockBtn" class="btn-primary" style="width:auto; padding:10px 18px;"><i class="fas fa-play"></i> معالجة</button>
            </div>
            <button id="exportStockBtn" class="btn-secondary"><i class="fas fa-file-excel"></i> تصدير المرجع</button>
            <div id="stockTableContainer" class="data-wrapper"></div>
        </div>
    </div>

    <!-- تبويب المقارنة -->
    <div id="tab-cmp" class="panel">
        <div class="card">
            <input type="text" id="searchCompare" class="search-input" placeholder="🔍 بحث في المقارنة">
            <div class="compare-stats-grid">
                <div class="compare-stat-card"><div class="compare-stat-number" id="statsActualItems">0</div><div class="compare-stat-label">📦 الفعلي</div></div>
                <div class="compare-stat-card"><div class="compare-stat-number" id="statsIncreaseCount">0</div><div class="compare-stat-label">⬆️ زيادة</div></div>
                <div class="compare-stat-card"><div class="compare-stat-number" id="statsDecreaseCount">0</div><div class="compare-stat-label">⬇️ نقص</div></div>
                <div class="compare-stat-card"><div class="compare-stat-number" id="statsMatchCount">0</div><div class="compare-stat-label">✅ مطابق</div></div>
                <div class="compare-stat-card"><div class="compare-stat-number" id="statsScannedCount">0</div><div class="compare-stat-label">🔄 المجرود</div></div>
                <div class="compare-stat-card"><div class="compare-stat-number" id="statsTotalDiff">0</div><div class="compare-stat-label">⚖️ الفرق</div></div>
            </div>
            <div class="filter-btns" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;">
                <button class="filter-btn active" data-filter="all">الكل</button>
                <button class="filter-btn" data-filter="increase">⬆️ زيادة</button>
                <button class="filter-btn" data-filter="decrease">⬇️ نقص</button>
                <button class="filter-btn" data-filter="match">✅ مطابق</button>
            </div>
            <button id="exportCompareBtn" class="btn-secondary"><i class="fas fa-file-excel"></i> تصدير المقارنة</button>
            <div id="comparisonTableDiv" class="data-wrapper"></div>
        </div>
    </div>

    <!-- تبويب المنتجات -->
    <div id="tab-products" class="panel">
        <div class="card">
            <div class="file-label" id="dbUploadArea"><i class="fas fa-upload"></i> رفع ملف المنتجات <input type="file" id="dbFileInput" style="display:none;" multiple></div>
            <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px;">
                <button id="processDbBtn" class="btn-primary">معالجة عادي</button>
                <button id="processDbNoFilterBtn" class="btn-secondary">بدون فلتر</button>
            </div>
            <button id="exportProductsBtn" class="btn-secondary"><i class="fas fa-file-excel"></i> تصدير المنتجات</button>
            <div id="productsTableContainer" class="data-wrapper"></div>
            <button id="clearProductsBtn" class="btn-secondary" style="margin-top:12px;">مسح كل المنتجات</button>
        </div>
    </div>
</div>

<div id="productModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); backdrop-filter:blur(6px); justify-content:center; align-items:center; z-index:3000;">
    <div style="background:white; border-radius:44px; padding:24px; width:90%; max-width:380px;">
        <h3>➕ إضافة منتج</h3>
        <input type="text" id="modalItemNo" placeholder="رقم الصنف *">
        <input type="text" id="modalName" placeholder="الاسم *">
        <input type="text" id="modalBarcode" placeholder="الباركود (اختياري)">
        <input type="number" id="modalQty" placeholder="كمية مرجعية" value="0">
        <div style="display:flex; gap:12px; margin-top:12px;">
            <button id="saveProductBtn" style="background:#0f2b3d; color:white; border:none; padding:12px; border-radius:40px; flex:1;">حفظ</button>
            <button id="closeModalBtn" style="background:#eef2f6; border:none; padding:12px; border-radius:40px; flex:1;">إلغاء</button>
        </div>
    </div>
</div>

<script>
    // -------------------------------------------------------------
    // الكود الأساسي (رفع الملفات، الجرد اليدوي) مع كاميرا محسنة
    // -------------------------------------------------------------
    let db;
    const DB_NAME = "FinalJardSystem";
    const DB_VERSION = 30;
    let inventory = [];
    let html5QrScanner = null, scanningActive = false;
    let availableCameras = [];
    let currentCameraId = null;
    let processingLock = false;

    const barcodeInput = document.getElementById('barcodeInput');

    function playBeep(success) {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (success) {
                osc.frequency.setValueAtTime(880, now);
                gain.gain.setValueAtTime(0.25, now);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
                osc.start(now); osc.stop(now + 0.35);
            } else {
                osc.frequency.setValueAtTime(220, now);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            }
        } catch(e) {}
    }
    function flashCard(color) {
        const card = document.getElementById('scanCard');
        if (card) {
            card.classList.add(color === 'green' ? 'flash-green' : 'flash-red');
            setTimeout(() => card.classList.remove('flash-green', 'flash-red'), 400);
        }
    }
    function showToast(msg, isErr = false, duration = 3000) {
        let t = document.querySelector('.toast'); if (t) t.remove();
        const toast = document.createElement('div'); toast.className = 'toast';
        toast.style.backgroundColor = isErr ? '#b91c1c' : '#0f2b3d';
        toast.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), duration);
    }
    function showProgress(percent, text) {
        const container = document.getElementById('globalProgress');
        const fill = document.getElementById('progressFill');
        if (percent === undefined) { container.style.display = 'none'; return; }
        container.style.display = 'block';
        fill.style.width = percent + '%';
        fill.textContent = text || `${Math.floor(percent)}%`;
    }
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
    function generateUniqueId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 9) + '-' + performance.now(); }

    function readExcelFile(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const sheet = wb.Sheets[wb.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "", blankrows: false });
                    resolve(rows);
                } catch (err) { reject(err); }
            };
            reader.onerror = () => reject(new Error("فشل القراءة"));
            reader.readAsArrayBuffer(file);
        });
    }
    function getCommonBlacklist(rows) {
        const counts = new Map();
        for (let i = 0; i < Math.min(rows.length, 100); i++) {
            const row = rows[i]; if (!Array.isArray(row)) continue;
            for (let cell of row) { let v = String(cell || '').trim(); if (v) counts.set(v, (counts.get(v) || 0) + 1); }
        }
        const black = []; for (let [txt, c] of counts.entries()) if (c > 15) black.push(txt);
        return black;
    }
    function parseProductRow(row, blacklist) {
        let res = { barcode: "", item_no: "", name: "" };
        if (!Array.isArray(row)) return res;
        let candidates = { long: [], dash: [], text: [] };
        for (let cell of row) {
            let v = String(cell || '').trim();
            if (!v || blacklist.includes(v)) continue;
            if (/^\d+\.0+$/.test(v)) v = v.replace(/\.0+$/, '');
            let digits = v.replace(/[^\d]/g, '');
            if (digits.length >= 8 && digits.length <= 20) candidates.long.push(v);
            if (v.includes('-') && v.length > 8) candidates.dash.push(v);
            if (/[a-zA-Z\u0600-\u06FF]/.test(v) && v.length > 2 && !/^\d+$/.test(v)) candidates.text.push(v);
        }
        if (candidates.dash.length) res.item_no = candidates.dash[0];
        else if (candidates.long.length) res.item_no = candidates.long[0];
        if (candidates.long.length) {
            for (let n of candidates.long) if (n !== res.item_no) { res.barcode = n; break; }
            if (!res.barcode && candidates.long.length) res.barcode = candidates.long[0];
        }
        if (candidates.text.length) res.name = candidates.text[0];
        return res;
    }
    function parseStockRow(row, blacklist, qtyCol) {
        let d = { item_no: "", name: "", qty: 0 };
        if (qtyCol !== undefined && row[qtyCol] !== undefined) {
            let q = parseFloat(String(row[qtyCol]).replace(/[^\d.-]/g, ''));
            d.qty = isNaN(q) ? 0 : q;
        }
        for (let cell of row) {
            let v = String(cell || '').trim();
            if (!v || blacklist.includes(v)) continue;
            if (/^\d+\.0+$/.test(v)) v = v.replace(/\.0+$/, '');
            if (!d.item_no) {
                let digits = v.replace(/-/g, '');
                if (v.includes('-') && /^\d+$/.test(digits) && digits.length > 10) d.item_no = v;
                else if (/^\d+$/.test(v) && v.length > 6) d.item_no = v;
            }
            if (!d.name && /[a-zA-Z\u0600-\u06FF]/.test(v) && v.length > 2) d.name = v;
        }
        return d;
    }

    let pendingProductFiles = [];
    document.getElementById('dbFileInput').addEventListener('change', (e) => { pendingProductFiles = Array.from(e.target.files); });
    async function processProductFiles(skipBlacklist = false) {
        if (!pendingProductFiles.length) { showToast("اختر ملفات أولاً", true); return; }
        const sourceId = Date.now();
        let totalAdded = 0;
        for (const file of pendingProductFiles) {
            try {
                const rows = await readExcelFile(file);
                if (!rows || rows.length < 2) throw new Error("لا توجد بيانات كافية");
                const blacklist = skipBlacklist ? [] : getCommonBlacklist(rows);
                const dataRows = rows.slice(1);
                const BATCH_SIZE = 150;
                for (let start = 0; start < dataRows.length; start += BATCH_SIZE) {
                    const batch = dataRows.slice(start, Math.min(start + BATCH_SIZE, dataRows.length));
                    const tx = db.transaction(["products"], "readwrite");
                    const store = tx.objectStore("products");
                    for (const row of batch) {
                        let d = parseProductRow(row, blacklist);
                        if (d.item_no || d.barcode) {
                            store.add({ id: generateUniqueId(), barcode: d.barcode || "", item_no: d.item_no || "", name: d.name || "بدون اسم", sourceId });
                            totalAdded++;
                        }
                    }
                    await new Promise((resolve, reject) => { tx.oncomplete = resolve; tx.onerror = () => reject(tx.error); });
                    await new Promise(r => setTimeout(r, 10));
                }
            } catch (err) { showToast(`خطأ في ${file.name}: ${err.message}`, true); return; }
        }
        const ftx = db.transaction("uploadedFiles", "readwrite");
        ftx.objectStore("uploadedFiles").add({ names: pendingProductFiles.map(f=>f.name).join(', '), count: totalAdded, sourceId });
        await new Promise(r => { ftx.oncomplete = r; });
        showToast(`✅ تم رفع ${totalAdded} منتج`);
        pendingProductFiles = [];
        updateAllUI();
    }
    document.getElementById('processDbBtn').onclick = () => processProductFiles(false);
    document.getElementById('processDbNoFilterBtn').onclick = () => processProductFiles(true);

    let pendingStockFiles = [];
    document.getElementById('stockFileInput').addEventListener('change', (e) => { pendingStockFiles = Array.from(e.target.files); });
    async function processStockFiles() {
        if (!pendingStockFiles.length) { showToast("اختر ملف المرجع أولاً", true); return; }
        const mode = document.getElementById('stockModeSelect').value;
        if (mode === 'replace') {
            const clearTx = db.transaction("stock", "readwrite");
            clearTx.objectStore("stock").clear();
            await new Promise(r => { clearTx.oncomplete = r; });
        }
        for (const file of pendingStockFiles) {
            const rows = await readExcelFile(file);
            let qtyCol = undefined;
            if (rows[0]) for (let i=0; i<rows[0].length; i++) if (String(rows[0][i]).trim() === "الفعلي النهائي") qtyCol = i;
            const blacklist = getCommonBlacklist(rows);
            const dataRows = rows.slice(1);
            for (let start=0; start<dataRows.length; start+=200) {
                const batch = dataRows.slice(start, start+200);
                const tx = db.transaction("stock", "readwrite");
                const store = tx.objectStore("stock");
                for (const row of batch) {
                    let d = parseStockRow(row, blacklist, qtyCol);
                    if (!d.item_no) continue;
                    if (mode === 'merge') {
                        const existing = await new Promise(r => store.get(d.item_no).onsuccess = e => r(e.target.result));
                        store.put({ key: d.item_no, name: d.name || existing?.name || '', qty: (existing ? existing.qty : 0) + d.qty });
                    } else {
                        store.put({ key: d.item_no, name: d.name, qty: d.qty });
                    }
                }
                await new Promise(r => { tx.oncomplete = r; });
                await new Promise(r => setTimeout(r, 10));
            }
        }
        showToast("تم تحديث المرجع");
        pendingStockFiles = [];
        updateAllUI();
    }

    async function addToInventory(itemCode, productName, barcode = '') {
        return new Promise((resolve) => {
            const tx = db.transaction("inventory", "readwrite");
            const store = tx.objectStore("inventory");
            const key = itemCode;
            const getReq = store.get(key);
            getReq.onsuccess = () => {
                let existing = getReq.result;
                if (existing) {
                    existing.qty++;
                    store.put(existing);
                } else {
                    store.put({ key, name: productName, qty: 1, barcode: barcode, item_no: itemCode });
                }
                tx.oncomplete = () => resolve(true);
                tx.onerror = () => resolve(false);
            };
            getReq.onerror = () => resolve(false);
        });
    }

    async function lookupAndAdd(cleanVal, fromCamera = false) {
        if (!cleanVal) return false;
        if (processingLock) return false;
        processingLock = true;
        try {
            const tx = db.transaction(["products", "stock"], "readonly");
            const products = await new Promise(r => tx.objectStore("products").getAll().onsuccess = e => r(e.target.result));
            let match = products.find(p => p.barcode === cleanVal || p.item_no === cleanVal);
            if (match) {
                await addToInventory(match.item_no || match.barcode, match.name, match.barcode);
                playBeep(true); flashCard('green');
                showToast(`✓ تم جرد: ${match.name}`, false, 1200);
                updateAllUI();
                return true;
            }
            const stockStore = tx.objectStore("stock");
            const stockItem = await new Promise(r => stockStore.get(cleanVal).onsuccess = e => r(e.target.result));
            if (stockItem) {
                const addTx = db.transaction(["products"], "readwrite");
                addTx.objectStore("products").add({ id: generateUniqueId(), barcode: cleanVal, item_no: stockItem.key, name: stockItem.name, sourceId: "auto" });
                await new Promise(r => { addTx.oncomplete = r; });
                await addToInventory(stockItem.key, stockItem.name, cleanVal);
                playBeep(true); flashCard('green');
                showToast(`✓ تم إضافة تلقائياً وجرد: ${stockItem.name}`, false, 1500);
                updateAllUI();
                return true;
            }
            await addToInventory(cleanVal, "❓ غير معروف", cleanVal);
            playBeep(false); flashCard('red');
            showToast(`⚠️ منتج غير مسجل - تم إضافة "غير معروف" +1`, true, 2000);
            updateAllUI();
            return false;
        } catch (err) {
            console.error(err);
            return false;
        } finally {
            processingLock = false;
        }
    }

    async function updateQuantity(key, delta) {
        const tx = db.transaction("inventory", "readwrite");
        const store = tx.objectStore("inventory");
        const item = await new Promise(r => store.get(key).onsuccess = e => r(e.target.result));
        if (item) {
            let newQty = item.qty + delta;
            if (newQty < 0) newQty = 0;
            item.qty = newQty;
            store.put(item);
            await new Promise(r => { tx.oncomplete = r; });
            updateAllUI();
        }
    }
    async function editName(key) {
        const tx = db.transaction("inventory", "readwrite");
        const store = tx.objectStore("inventory");
        const item = await new Promise(r => store.get(key).onsuccess = e => r(e.target.result));
        if (item) {
            let newName = prompt("الاسم الجديد:", item.name);
            if (newName && newName.trim()) {
                item.name = newName.trim();
                store.put(item);
                await new Promise(r => { tx.oncomplete = r; });
                updateAllUI();
            }
        }
    }

    async function startCamera(cameraId = null) {
        if (scanningActive && html5QrScanner) await html5QrScanner.stop().catch(()=>{});
        scanningActive = false;
        const cameraDiv = document.getElementById('cameraDiv');
        cameraDiv.classList.remove('hidden');
        try {
            const targetId = cameraId || currentCameraId;
            if (!targetId) throw new Error("لا توجد كاميرا");
            html5QrScanner = new Html5Qrcode("reader2");
            await html5QrScanner.start(
                { deviceId: { exact: targetId } },
                { fps: 15, qrbox: { width: 280, height: 120 } },  // مستطيل أفقي
                async (decoded) => {
                    if (processingLock) return;
                    processingLock = true;
                    try {
                        let cleanVal = decoded.replace(/\.0+$/, '').trim();
                        barcodeInput.value = cleanVal;
                        await lookupAndAdd(cleanVal, true);
                        barcodeInput.value = '';
                    } finally {
                        processingLock = false;
                    }
                },
                (err) => { console.warn(err); }
            );
            scanningActive = true;
            currentCameraId = targetId;
            // تعديل موقع المستطيل بعد التشغيل
            setTimeout(adjustScannerBox, 500);
        } catch (err) { showToast("خطأ في الكاميرا: " + err.message, true); cameraDiv.classList.add('hidden'); scanningActive = false; }
    }
    async function closeCamera() {
        if (html5QrScanner && scanningActive) {
            await html5QrScanner.stop().catch(()=>{});
            await html5QrScanner.clear().catch(()=>{});
        }
        scanningActive = false;
        document.getElementById('cameraDiv').classList.add('hidden');
    }
    async function switchCamera() {
        if (!availableCameras.length) await listCameras();
        if (availableCameras.length === 0) { showToast("لا توجد كاميرات", true); return; }
        const currentIndex = availableCameras.findIndex(c => c.id === currentCameraId);
        const nextIndex = (currentIndex + 1) % availableCameras.length;
        const nextCam = availableCameras[nextIndex];
        await closeCamera();
        await startCamera(nextCam.id);
    }
    document.getElementById('startCamBtn').onclick = async () => { if (!availableCameras.length) await listCameras(); if (currentCameraId) startCamera(currentCameraId); else if (availableCameras.length) startCamera(availableCameras[0].id); else showToast("لا توجد كاميرا", true); };
    document.getElementById('switchCamBtn').onclick = switchCamera;
    document.getElementById('closeCamBtn').onclick = closeCamera;

    document.getElementById('stockUploadArea').addEventListener('click',()=>document.getElementById('stockFileInput').click());
    document.getElementById('dbUploadArea').addEventListener('click',()=>document.getElementById('dbFileInput').click());
    document.getElementById('clearProductsBtn').onclick = () => {
        if(confirm("مسح كل المنتجات؟")){
            const tx1=db.transaction("products","readwrite"); tx1.objectStore("products").clear();
            const tx2=db.transaction("uploadedFiles","readwrite"); tx2.objectStore("uploadedFiles").clear();
            Promise.all([new Promise(r=>{ tx1.oncomplete=r; }), new Promise(r=>{ tx2.oncomplete=r; })]).then(()=>{ updateAllUI(); showToast("تم مسح المنتجات"); });
        }
    };
    document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', function () {
        let target = this.getAttribute('data-tab');
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        this.classList.add('active');
        document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active-pane'));
        document.getElementById(target).classList.add('active-pane');
        updateAllUI();
    }));
    function initDB() {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains("products")) db.createObjectStore("products", { keyPath: "id", autoIncrement: false });
            if (!db.objectStoreNames.contains("inventory")) db.createObjectStore("inventory", { keyPath: "key" });
            if (!db.objectStoreNames.contains("stock")) db.createObjectStore("stock", { keyPath: "key" });
            if (!db.objectStoreNames.contains("uploadedFiles")) db.createObjectStore("uploadedFiles", { keyPath:"id", autoIncrement:true });
        };
        req.onsuccess = (e) => { db = e.target.result; updateAllUI(); listCameras(); };
        req.onerror = (e) => console.error(e);
    }
    initDB();
</script>
</body>
</html>
